# Action pinning policy:
#   - First-party `actions/*` actions are pinned to a major version tag (e.g. @v4).
#   - Any third-party action must be pinned to a full commit SHA with a
#     version comment. (None are currently used.)
name: test

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.tfm }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        tfm: [net10.0]
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
      NUGET_XMLDOC_MODE: skip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/global.json', '**/nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ARCP.sln

      - name: Format check
        run: dotnet format ARCP.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build ARCP.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test tests/ARCP.UnitTests/ARCP.UnitTests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=unit-tests.trx"
          --logger "console;verbosity=detailed"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.tfm }}
          path: ${{ github.workspace }}/TestResults
          if-no-files-found: ignore
          retention-days: 7
